<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muted Forest · Wonokromo · Interactive Pixel Walk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        .game-wrapper {
            position: relative;
            display: inline-block;
            border: 6px solid #3a3a3a;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            background: #f0f0f0;
        }
        canvas {
            display: block;
            width: 800px;
            height: 600px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            cursor: default;
        }
        .ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            text-shadow: 2px 2px 0 #000, 4px 4px 0 rgba(0,0,0,0.5);
            pointer-events: none;
            font-size: 1.2rem;
            line-height: 1.4;
        }
        .ui-overlay small {
            display: block;
            font-size: 0.7rem;
            opacity: 0.8;
        }
        #info-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #e0e0e0;
            padding: 12px 24px;
            border: 2px solid #8a7a5a;
            border-radius: 8px;
            font-size: 0.9rem;
            max-width: 80%;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.3s;
            opacity: 0;
            backdrop-filter: blur(4px);
        }
        #info-box.visible {
            opacity: 1;
        }
        #info-box strong { color: #ffd9a0; }
        #info-box em { color: #aaccaa; }
        .controls-hint {
            position: absolute;
            bottom: 80px;
            right: 20px;
            color: #aaa;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 4px;
            pointer-events: none;
            border: 1px solid #555;
        }
        @media (max-width: 820px) {
            canvas { width: 100%; height: auto; aspect-ratio: 4/3; }
            .ui-overlay { font-size: 0.9rem; }
            #info-box { font-size: 0.7rem; padding: 8px 16px; bottom: 10px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="scene" width="800" height="600"></canvas>
    <div class="ui-overlay">
        🌿 MUTED FOREST · WONOKROMO<br>
        <small>a sound‑photography showcase by Karnivulgar</small>
    </div>
    <div id="info-box"></div>
    <div class="controls-hint">← ↑ → ↓  walk · click objects</div>
</div>

<script>
    (function() {
        // ----- setup canvas -----
        const canvas = document.getElementById('scene');
        const ctx = canvas.getContext('2d');
        const W = 800, H = 600;
        const S = 2; // pixel scale

        // ----- game state -----
        const player = {
            x: 380, y: 390,  // starting position (on path)
            w: 12, h: 24,
            speed: 1.5,
            dir: 0, // 0=down, 1=left, 2=right, 3=up (for sprite)
            moving: false,
            frame: 0,
            frameCounter: 0,
        };
        let keys = { left: false, right: false, up: false, down: false };

        // ----- interactive hotspots -----
        const hotspots = [];

        // 1. sign near start (left arrow sign)
        hotspots.push({
            x: 160, y: 260, w: 30, h: 30,
            label: 'Signpost',
            info: '🚶‍♀️ "Wonokromo" — forest settlement. The path ahead leads to the hidden forest fragment. (Exhibition: 10 July 2026, IFI Surabaya)'
        });
        // 2. Monstera plant
        hotspots.push({
            x: 710, y: 480, w: 80, h: 80,
            label: 'Monstera deliciosa',
            info: '🌿 Large split‑leaf plant. A symbol of the dense, overlooked greenery that persists despite official classification as "0.0 ha forest".'
        });
        // 3. mesh panel with forest silhouette
        hotspots.push({
            x: 300, y: 270, w: 40, h: 50,
            label: 'Misty forest mural',
            info: '🌫️ Silhouette of a dark, misty forest. The mural reflects the invisible ecosystem — what data erases, art remembers.'
        });
        // 4. distant structure (dark roof)
        hotspots.push({
            x: 600, y: 130, w: 80, h: 50,
            label: 'Structure',
            info: '🏛️ Glimpse of a dark‑roofed building — perhaps an old colonial remnant. The forest reclaims everything.'
        });
        // 5. second signpost (further right)
        hotspots.push({
            x: 380, y: 270, w: 30, h: 30,
            label: 'Direction sign',
            info: '⬅️ The artist talk and exhibition: 10 July, IFI Surabaya. "Sound Art dan Ekologi Urban" — moderated discussion.'
        });
        // 6. the girl herself (interact to hear about the project)
        // we'll handle this separately

        // ----- draw scene (pixel art) -----
        function drawScene() {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, W, H);

            // ----- helper: pixel block -----
            function pixel(x, y, color) {
                ctx.fillStyle = color;
                ctx.fillRect(x * S, y * S, S, S);
            }

            // ----- color palette -----
            const colors = {
                sky: '#f5f5f0',
                cloud: '#fafaf5',
                tileLight: '#b8b0a8',
                tileDark: '#a09890',
                tileLine: '#8a8078',
                wood: '#7a4a2e',
                woodLight: '#8a5a3e',
                woodDark: '#5a3220',
                mesh: '#3a3a3a',
                meshFrame: '#4a4a4a',
                base: '#2a2a2a',
                forestDark: '#1a1a20',
                forestMid: '#2a2a35',
                forestLight: '#3a3a4a',
                leafDark: '#1a3a1a',
                leafMid: '#2a5a2a',
                leafLight: '#3a7a3a',
                monstera: '#1a4a1a',
                monsteraSplit: '#0a2a0a',
                skin: '#e8c8a0',
                hair: '#2a1a0a',
                dress: '#8a3a5a',
                shoes: '#3a2a1a',
                hat: '#6a4a2a',
                signWood: '#8a6a3a',
                signArrow: '#c8a060',
                roofDark: '#1a1a1a',
                wall: '#4a4a4a',
            };

            // ---- sky ----
            ctx.fillStyle = colors.sky;
            ctx.fillRect(0, 0, W, H);

            // ---- clouds (overcast) ----
            for (let i = 0; i < 60; i++) {
                let x = 10 + (i * 25) + Math.sin(i * 0.7) * 15;
                let y = 20 + Math.sin(i * 1.2) * 8;
                for (let dy = 0; dy < 6; dy++) {
                    for (let dx = 0; dx < 20 + Math.sin(i * 0.5) * 8; dx++) {
                        pixel(x + dx, y + dy, colors.cloud);
                    }
                }
            }

            // ---- far background: trees and structure ----
            function drawDistantTree(cx, cy, h, w, shade) {
                for (let y = 0; y < h; y++) {
                    let spread = w * (1 - y / h * 0.7);
                    for (let x = -spread; x < spread; x++) {
                        if (Math.random() > 0.3) {
                            pixel(cx + x, cy - y, shade);
                        }
                    }
                }
            }
            drawDistantTree(100, 180, 60, 40, colors.leafDark);
            drawDistantTree(180, 200, 70, 50, colors.leafMid);
            drawDistantTree(720, 160, 50, 35, colors.leafDark);
            drawDistantTree(760, 200, 65, 45, colors.leafMid);
            drawDistantTree(50, 220, 40, 30, colors.leafDark);
            drawDistantTree(780, 230, 55, 40, colors.leafLight);

            // structure
            for (let y = 80; y < 160; y++) {
                for (let x = 550; x < 700; x++) {
                    if ((x - 550) * 0.6 + (y - 80) * 0.8 < 80) {
                        pixel(x, y, colors.roofDark);
                    }
                }
            }
            for (let y = 160; y < 220; y++) {
                for (let x = 570; x < 680; x++) {
                    if (x > 580 && x < 670 && y > 170) {
                        pixel(x, y, colors.wall);
                    }
                }
            }

            // ---- fence ----
            // base
            for (let y = 300; y < 310; y++) {
                for (let x = 50; x < 750; x++) {
                    let curve = Math.sin((x - 50) * 0.008) * 20;
                    if (y + curve > 300 && y + curve < 330) {
                        pixel(x, y + curve, colors.base);
                    }
                }
            }

            // panels
            for (let seg = 0; seg < 28; seg++) {
                let xStart = 60 + seg * 24;
                let curveOff = Math.sin((xStart - 50) * 0.008) * 20;
                let yBase = 300 + curveOff;

                if (seg % 2 === 0) {
                    // wooden planks
                    for (let i = 0; i < 6; i++) {
                        let x = xStart + i * 4;
                        for (let y = yBase - 40; y < yBase; y++) {
                            let shade = (i % 2 === 0) ? colors.wood : colors.woodLight;
                            pixel(x, y, shade);
                        }
                    }
                    // arrow sign (every 4th)
                    if (seg % 4 === 0) {
                        let signX = xStart + 6;
                        let signY = yBase - 32;
                        for (let i = 0; i < 12; i++) {
                            pixel(signX - i, signY - 2, colors.signWood);
                            pixel(signX - i, signY - 1, colors.signWood);
                            pixel(signX - i, signY, colors.signWood);
                            if (i === 11) {
                                pixel(signX - i - 4, signY - 4, colors.signArrow);
                                pixel(signX - i - 4, signY + 4, colors.signArrow);
                            }
                        }
                    }
                } else {
                    // mesh panel with forest silhouette
                    for (let y = yBase - 38; y < yBase; y++) {
                        for (let x = xStart; x < xStart + 22; x++) {
                            if ((x - xStart) % 3 === 0 || (y - (yBase - 38)) % 3 === 0) {
                                pixel(x, y, colors.mesh);
                            }
                            let localX = x - xStart;
                            let localY = y - (yBase - 38);
                            if (localX > 4 && localX < 18 && localY > 12) {
                                let treeH = 8 + Math.sin(localX * 0.8) * 4;
                                if (localY > 20 - treeH) {
                                    pixel(x, y, colors.forestDark);
                                }
                            }
                            if (localY > 28 && localX > 6 && localX < 16) {
                                if (Math.random() > 0.7) pixel(x, y, colors.forestLight);
                            }
                        }
                    }
                    // frame
                    for (let i = 0; i < 22; i++) {
                        pixel(xStart + i, yBase - 38, colors.meshFrame);
                        pixel(xStart + i, yBase - 1, colors.meshFrame);
                    }
                    for (let i = 0; i < 38; i++) {
                        pixel(xStart, yBase - 38 + i, colors.meshFrame);
                        pixel(xStart + 21, yBase - 38 + i, colors.meshFrame);
                    }
                }
            }

            // ---- walkway ----
            for (let y = 310; y < 480; y++) {
                let curve = Math.sin((y - 310) * 0.02) * 30;
                for (let x = 70 + curve; x < 730 + curve; x++) {
                    let tileX = Math.floor((x - 70 - curve) / 16);
                    let tileY = Math.floor((y - 310) / 12);
                    let shade = ((tileX + tileY) % 2 === 0) ? colors.tileLight : colors.tileDark;
                    pixel(x, y, shade);
                    if ((x - 70 - curve) % 16 === 0 || (y - 310) % 12 === 0) {
                        pixel(x, y, colors.tileLine);
                    }
                }
            }

            // ---- foreground bushes ----
            function drawBush(cx, cy, w, h, shade) {
                for (let y = 0; y < h; y++) {
                    let spread = w * (1 - y / h * 0.5);
                    for (let x = -spread; x < spread; x++) {
                        if (Math.random() > 0.2) {
                            pixel(cx + x, cy - y, shade);
                        }
                    }
                }
            }
            drawBush(60, 500, 80, 60, colors.leafDark);
            drawBush(100, 520, 70, 50, colors.leafMid);
            drawBush(40, 510, 60, 55, colors.leafLight);

            // ---- Monstera plant (right foreground) ----
            function drawMonstera(cx, cy) {
                for (let i = 0; i < 6; i++) {
                    let angle = -0.8 + i * 0.3;
                    let len = 20 + i * 8;
                    for (let t = 0; t < len; t++) {
                        let px = cx + Math.sin(angle + t * 0.05) * t * 0.8;
                        let py = cy - t * 0.9;
                        pixel(px, py, colors.monstera);
                    }
                    let lx = cx + Math.sin(angle + len * 0.05) * len * 0.8;
                    let ly = cy - len * 0.9;
                    for (let d = 0; d < 18; d++) {
                        let spread = 10 + Math.sin(d * 0.5) * 6;
                        for (let s = -spread; s < spread; s += 2) {
                            let px2 = lx + s * 0.8;
                            let py2 = ly - d * 0.6;
                            if (Math.abs(s) > 4 && Math.abs(s) < 8 && d > 6) continue;
                            pixel(px2, py2, (d % 2 === 0) ? colors.monstera : colors.monsteraSplit);
                        }
                    }
                }
            }
            drawMonstera(720, 540);
            drawMonstera(740, 500);

            // ---- more foreground leaves ----
            for (let i = 0; i < 20; i++) {
                let x = 680 + Math.random() * 100;
                let y = 460 + Math.random() * 100;
                if (x > 700 && y > 480) {
                    drawBush(x, y, 20 + Math.random() * 30, 20 + Math.random() * 30, colors.leafLight);
                }
            }

            // ---- draw player (girl) ----
            drawGirl(player.x, player.y, player.dir);

            // ---- draw hotspots (transparent overlays for debug, but we'll draw them as small indicators) ----
            // We'll mark hotspots with subtle glowing dots so players know they can interact.
            // We'll draw them after the girl so they're on top if needed.
            for (let h of hotspots) {
                // draw a small semi‑transparent circle to indicate interactivity
                ctx.fillStyle = 'rgba(255, 220, 100, 0.3)';
                ctx.beginPath();
                ctx.arc((h.x + h.w/2) * S, (h.y + h.h/2) * S, 12, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 220, 100, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // ----- draw girl pixel art (with direction) -----
        function drawGirl(x, y, dir) {
            // dir: 0=down, 1=left, 2=right, 3=up (we'll use for walking animation)
            // we'll just draw a static sprite for now but with facing
            const cx = x * S;
            const cy = y * S;
            // body (dress)
            for (let dy = 0; dy < 16; dy++) {
                let width = 8 + Math.sin(dy * 0.5) * 3;
                for (let dx = -width; dx < width; dx += 2) {
                    ctx.fillStyle = '#8a3a5a';
                    ctx.fillRect(cx + dx*S, cy - dy*S, S, S);
                }
            }
            // legs
            for (let i = 0; i < 6; i++) {
                ctx.fillStyle = '#3a2a1a';
                ctx.fillRect(cx + (-4 + i)*S, cy + 2*S, S, S);
                ctx.fillRect(cx + (-3 + i)*S, cy + 4*S, S, S);
            }
            // head
            for (let dy = 0; dy < 10; dy++) {
                let r = 6 - dy * 0.4;
                for (let dx = -r; dx < r; dx += 2) {
                    ctx.fillStyle = '#e8c8a0';
                    ctx.fillRect(cx + dx*S, cy - 18*S - dy*S, S, S);
                }
            }
            // hair
            for (let dy = 0; dy < 8; dy++) {
                for (let dx = -8; dx < 8; dx += 2) {
                    if (Math.abs(dx) > 4 || dy < 3) {
                        ctx.fillStyle = '#2a1a0a';
                        ctx.fillRect(cx + dx*S, cy - 20*S - dy*S, S, S);
                    }
                }
            }
            // hat
            for (let dy = 0; dy < 6; dy++) {
                let r = 10 - dy * 0.5;
                for (let dx = -r; dx < r; dx += 2) {
                    ctx.fillStyle = '#6a4a2a';
                    ctx.fillRect(cx + dx*S, cy - 28*S - dy*S, S, S);
                }
            }
            // hat band
            for (let dx = -8; dx < 8; dx += 2) {
                ctx.fillStyle = '#c8a060';
                ctx.fillRect(cx + dx*S, cy - 26*S, S, S);
            }
            // eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(cx - 2*S, cy - 20*S, S, S);
            ctx.fillRect(cx + 2*S, cy - 20*S, S, S);
            // mouth
            ctx.fillStyle = '#8a4a3a';
            ctx.fillRect(cx, cy - 16*S, S, S);
        }

        // ----- interaction logic -----
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            return { x: mouseX / S, y: mouseY / S }; // convert to pixel coords
        }

        function checkHotspot(mx, my) {
            for (let h of hotspots) {
                if (mx >= h.x && mx <= h.x + h.w && my >= h.y && my <= h.y + h.h) {
                    return h;
                }
            }
            // check if clicked on girl (for self-reflection)
            const px = player.x, py = player.y;
            if (mx >= px-8 && mx <= px+8 && my >= py-28 && my <= py+4) {
                return { label: 'Karnivulgar', info: '🎭 "The mask is not a symbol—it is a method. Noise is not music. Noise is an epistemology." — Muted Forest: Wonokromo, a counter‑archive of a forgotten forest.' };
            }
            return null;
        }

        // ----- update player movement -----
        function updatePlayer() {
            let dx = 0, dy = 0;
            if (keys.left) dx = -player.speed;
            if (keys.right) dx = player.speed;
            if (keys.up) dy = -player.speed;
            if (keys.down) dy = player.speed;
            // normalize diagonal
            if (dx !== 0 && dy !== 0) {
                dx *= 0.707;
                dy *= 0.707;
            }
            // move
            let newX = player.x + dx;
            let newY = player.y + dy;
            // bounds: stay within walkway and screen
            // crude boundaries: keep within 70..730 and 320..470
            if (newX > 70 && newX < 730) player.x = newX;
            if (newY > 320 && newY < 470) player.y = newY;
            // update direction
            if (dx > 0) player.dir = 2;
            else if (dx < 0) player.dir = 1;
            else if (dy < 0) player.dir = 3;
            else if (dy > 0) player.dir = 0;
            player.moving = (dx !== 0 || dy !== 0);
            // animation frame
            if (player.moving) {
                player.frameCounter++;
                if (player.frameCounter > 6) {
                    player.frameCounter = 0;
                    player.frame = (player.frame + 1) % 4;
                }
            } else {
                player.frame = 0;
            }
        }

        // ----- game loop -----
        function gameLoop() {
            updatePlayer();
            drawScene();
            requestAnimationFrame(gameLoop);
        }

        // ----- event listeners -----
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key === 'ArrowLeft' || key === 'a') { keys.left = true; e.preventDefault(); }
            if (key === 'ArrowRight' || key === 'd') { keys.right = true; e.preventDefault(); }
            if (key === 'ArrowUp' || key === 'w') { keys.up = true; e.preventDefault(); }
            if (key === 'ArrowDown' || key === 's') { keys.down = true; e.preventDefault(); }
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key;
            if (key === 'ArrowLeft' || key === 'a') { keys.left = false; e.preventDefault(); }
            if (key === 'ArrowRight' || key === 'd') { keys.right = false; e.preventDefault(); }
            if (key === 'ArrowUp' || key === 'w') { keys.up = false; e.preventDefault(); }
            if (key === 'ArrowDown' || key === 's') { keys.down = false; e.preventDefault(); }
        });

        // mouse click
        canvas.addEventListener('click', (e) => {
            const pos = getMousePos(e);
            const hit = checkHotspot(pos.x, pos.y);
            const infoBox = document.getElementById('info-box');
            if (hit) {
                infoBox.innerHTML = `<strong>${hit.label}</strong><br>${hit.info}`;
                infoBox.classList.add('visible');
                // auto-hide after 8 seconds
                clearTimeout(window.infoTimeout);
                window.infoTimeout = setTimeout(() => {
                    infoBox.classList.remove('visible');
                }, 8000);
            } else {
                // if click on empty, hide info
                infoBox.classList.remove('visible');
            }
        });

        // mouse move to show cursor on hotspot
        canvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(e);
            const hit = checkHotspot(pos.x, pos.y);
            canvas.style.cursor = hit ? 'pointer' : 'default';
        });

        // ----- start game -----
        gameLoop();
    })();
</script>
</body>
</html>
