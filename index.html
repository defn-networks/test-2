<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muted Forest: Wonokromo</title>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; height: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        canvas { width: 100vw; height: 100vh; object-fit: contain; image-rendering: pixelated; touch-action: none; }
        #text-bubble { position: absolute; display: none; background: rgba(26, 26, 26, 0.9); color: #e0e5e5; padding: 10px; border: 1px solid #444; font-family: monospace; font-size: 12px; max-width: 80%; pointer-events: none; z-index: 20; border-radius: 4px; }
        #dpad { position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px; display: grid; grid-template-columns: 40px 40px 40px; grid-template-rows: 40px 40px 40px; gap: 2px; opacity: 0.35; z-index: 10; touch-action: none; }
        .dpad-btn { background-color: #2b2b2b; color: #8f9593; border: 2px solid #1a1a1a; font-size: 16px; display: flex; justify-content: center; align-items: center; cursor: pointer; border-radius: 4px; }
        .dpad-btn:active { background-color: #6c757d; color: #fff; }
    </style>
</head>
<body>
    <div id="text-bubble"></div>
    <canvas id="gameCanvas"></canvas>
    <div id="dpad">
        <div id="btn-up" class="dpad-btn">▲</div>
        <div id="btn-left" class="dpad-btn">◀</div>
        <div id="btn-right" class="dpad-btn">▶</div>
        <div id="btn-down" class="dpad-btn">▼</div>
    </div>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const bubble = document.getElementById('text-bubble');
    let GAME_WIDTH = 320, GAME_HEIGHT = 180, WORLD_WIDTH = 960; 

    function resizeCanvas() {
        const screenAspect = window.innerWidth / window.innerHeight;
        GAME_WIDTH = screenAspect > (16/9) ? Math.floor(180 * screenAspect) : 320;
        GAME_HEIGHT = 180;
        canvas.width = GAME_WIDTH; canvas.height = GAME_HEIGHT;
        WORLD_WIDTH = Math.max(960, GAME_WIDTH * 3);
    }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    const textZones = [
        { x: 150, html: "<b>System Override: The Architecture of Extraction</b><br><br>You could call this a forest. Officially, you’d be wrong. The data says Surabaya has zero hectares of natural forest. But inside Kebun Binatang Surabaya, the trees are still there." },
        { x: 300, html: "In 1942, the Japanese invasion was processed as destiny. One cultural algorithm replaced another. The bunker behind the zoo reminds us that extraction presents itself as progress." }
    ];

    const colors = { sky: '#e0e5e5', skyDark: '#8a9494', path: '#8f9593', pathLine: '#7a807e', fenceWood: '#5c2c16', fenceBase: '#2b2b2b', muralBG: '#6c757d', muralTree: '#222', monstera: '#153118', forestDeep: '#0d1c0f', structure: '#1a1a1a' };
    const player = { x: 50, y: 150, speed: 1.5, dx: 0, dy: 0 };
    let cameraX = 0;
    const keys = { w: false, a: false, s: false, d: false };

    window.addEventListener('keydown', (e) => {
        if (e.key === 'w' || e.key === 'ArrowUp') keys.w = true;
        if (e.key === 'a' || e.key === 'ArrowLeft') keys.a = true;
        if (e.key === 's' || e.key === 'ArrowDown') keys.s = true;
        if (e.key === 'd' || e.key === 'ArrowRight') keys.d = true;
    });
    window.addEventListener('keyup', (e) => {
        if (e.key === 'w' || e.key === 'ArrowUp') keys.w = false;
        if (e.key === 'a' || e.key === 'ArrowLeft') keys.a = false;
        if (e.key === 's' || e.key === 'ArrowDown') keys.s = false;
        if (e.key === 'd' || e.key === 'ArrowRight') keys.d = false;
    });

    function setupTouchButton(buttonId, keyName) {
        const btn = document.getElementById(buttonId);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; btn.classList.add('active'); }, { passive: false });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyName] = false; btn.classList.remove('active'); }, { passive: false });
        btn.addEventListener('mousedown', () => { keys[keyName] = true; btn.classList.add('active'); });
        btn.addEventListener('mouseup', () => { keys[keyName] = false; btn.classList.remove('active'); });
    }
    setupTouchButton('btn-up', 'w'); setupTouchButton('btn-left', 'a'); setupTouchButton('btn-down', 's'); setupTouchButton('btn-right', 'd');

    function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, WORLD_WIDTH, 0);
        gradient.addColorStop(0, colors.sky); gradient.addColorStop(0.7, colors.sky); gradient.addColorStop(1, colors.skyDark);
        ctx.fillStyle = gradient; ctx.fillRect(0, 0, WORLD_WIDTH, GAME_HEIGHT);
        ctx.fillStyle = '#2d4a22'; ctx.fillRect(0, 40, 400, 50); 
        ctx.fillStyle = colors.structure; ctx.fillRect(200, 30, 80, 40); 
        ctx.fillStyle = '#1e3814'; ctx.fillRect(350, 20, 150, 60); 
        ctx.fillStyle = colors.forestDeep; ctx.fillRect(600, 0, 400, 100); 
        ctx.fillStyle = '#132915'; ctx.fillRect(650, 20, 310, 80);
    }

    function drawFence() {
        const fenceY = 80; const fenceHeight = 50;
        ctx.fillStyle = colors.fenceBase; ctx.fillRect(0, fenceY + fenceHeight - 5, WORLD_WIDTH, 5);
        for (let i = 0; i < WORLD_WIDTH; i += 80) {
            ctx.fillStyle = colors.fenceWood; ctx.fillRect(i, fenceY, 40, fenceHeight - 5);
            ctx.fillStyle = '#4a2311'; for(let j = i; j < i + 40; j += 4) { ctx.fillRect(j, fenceY, 1, fenceHeight - 5); }
            if (i < 320) {
                ctx.fillStyle = colors.muralBG; ctx.fillRect(i + 40, fenceY, 40, fenceHeight - 5);
                ctx.fillStyle = colors.muralTree;
                ctx.fillRect(i + 45, fenceY + 10, 2, 35); ctx.fillRect(i + 52, fenceY + 15, 1, 30);
                ctx.fillRect(i + 65, fenceY + 5, 3, 40); ctx.fillRect(i + 72, fenceY + 20, 1, 25);
            } else {
                ctx.fillStyle = colors.fenceWood; ctx.fillRect(i + 40, fenceY, 40, fenceHeight - 5);
                ctx.fillStyle = '#2d4a22'; ctx.fillRect(i + 50, fenceY, 5, 40); ctx.fillRect(i + 65, fenceY + 10, 4, 35);
            }
        }
    }

    function drawWalkway() {
        const gradient = ctx.createLinearGradient(0, 0, WORLD_WIDTH, 0);
        gradient.addColorStop(0, colors.path); gradient.addColorStop(0.6, colors.path); gradient.addColorStop(0.9, '#4a443b'); 
        ctx.fillStyle = gradient; ctx.fillRect(0, 130, WORLD_WIDTH, 50);
        ctx.fillStyle = colors.pathLine; ctx.fillRect(0, 140, WORLD_WIDTH, 1); ctx.fillRect(0, 155, WORLD_WIDTH, 1); ctx.fillRect(0, 175, WORLD_WIDTH, 1);
        for (let i = -100; i < WORLD_WIDTH + 100; i += 30) {
            ctx.beginPath(); ctx.moveTo(i, 130); ctx.quadraticCurveTo(i + 20, 150, i + 50, 180); ctx.stroke();
        }
    }

    function drawMidgroundElements() {
        const ampX = 480, ampY = 70;
        ctx.fillStyle = colors.speakerBox; ctx.fillRect(ampX, ampY, 40, 60); ctx.fillRect(ampX + 5, ampY - 30, 30, 30); 
        ctx.fillStyle = colors.speakerCone; ctx.beginPath(); ctx.arc(ampX + 20, ampY + 15, 10, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(ampX + 20, ampY + 45, 10, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#111'; ctx.beginPath(); ctx.moveTo(ampX + 20, ampY + 60); ctx.quadraticCurveTo(ampX + 40, 150, ampX - 20, 170); ctx.stroke();
    }

    function defineForegroundPath() {
        ctx.beginPath(); ctx.rect(240, 100, 60, 80); ctx.rect(750, 80, 80, 100); ctx.rect(850, 60, 100, 120); ctx.rect(680, 130, 40, 60);
    }

    function drawForegroundElements() {
        ctx.fillStyle = colors.monstera; ctx.fillRect(240, 100, 60, 80);
        ctx.fillStyle = colors.monsteraDetail; ctx.fillRect(250, 120, 20, 2); ctx.fillRect(270, 140, 30, 3); ctx.fillRect(260, 160, 40, 2);
        ctx.fillStyle = colors.forestDeep; ctx.fillRect(750, 80, 80, 100); ctx.fillRect(850, 60, 100, 120); ctx.fillRect(680, 130, 40, 60);
    }

    function update() {
        if (keys.w) player.dy = -player.speed; else if (keys.s) player.dy = player.speed; else player.dy = 0;
        if (keys.a) player.dx = -player.speed; else if (keys.d) player.dx = player.speed; else player.dx = 0;
        player.x += player.dx; player.y += player.dy;
        cameraX = Math.max(0, Math.min(player.x - GAME_WIDTH / 2, WORLD_WIDTH - GAME_WIDTH));
        
        ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        ctx.save(); ctx.translate(-cameraX, 0); 
        
        drawBackground();
        drawFence();
        ctx.fillStyle = 'red'; ctx.fillRect(player.x, player.y, 8, 8);
        
        let found = false;
        for (let zone of textZones) {
            if (Math.abs(player.x - zone.x) < 40) {
                bubble.style.display = 'block'; bubble.innerHTML = zone.html;
                bubble.style.left = (canvas.offsetLeft + (canvas.width/2) - 100) + 'px';
                bubble.style.top = (canvas.offsetTop + 20) + 'px';
                found = true; break;
            }
        }
        if (!found) bubble.style.display = 'none';
        
        ctx.restore(); requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
